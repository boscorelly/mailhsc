# Standalone mode — app only, no Traefik, no HTTPS.
# Launched automatically by start.sh when DEPLOY_MODE=standalone.
# Suitable for: local dev, testing, or deployment behind an existing reverse proxy.

services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: mailhsc-app:latest
    container_name: mailhsc-app
    restart: unless-stopped

    environment:
      PORT: "${PORT:-8080}"

    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=16m

    cap_drop:
      - ALL

    ports:
      - "${STANDALONE_PORT:-8080}:${PORT:-8080}"

    networks:
      - mailhsc_standalone

    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          memory: 32M

    healthcheck:
      test: ["CMD", "/mailhsc", "--health-check"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  mailhsc_standalone:
    driver: bridge
